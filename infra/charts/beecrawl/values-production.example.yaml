global:
  # Replace with an immutable CI tag, for example sha-abcdef1.
  imageTag: dev
  imagePullPolicy: IfNotPresent
  environment: production

api:
  replicaCount: 2
  ingress:
    enabled: false
    className: nginx
    host: ""
    path: /
    pathType: Prefix
    tls:
      enabled: false
      secretName: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

beeEngine:
  replicaCount: 1
  env:
    BEE_ENGINE_MAX_PAGES: "4"
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi
