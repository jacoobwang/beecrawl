{{- if and .Values.api.enabled .Values.api.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beecrawl.fullname" . }}-{{ .Values.api.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "beecrawl.labels" . | nindent 4 }}
    component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "beecrawl.selectorLabels" . | nindent 4 }}
    app: {{ .Values.api.name }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
