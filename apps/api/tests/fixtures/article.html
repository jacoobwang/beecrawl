<!doctype html>
<html lang="en">
  <head><title>Ordered Article</title></head>
  <body>
    <main>
      <h1>First heading</h1>
      <p>Opening paragraph with <strong>important text</strong> and <a href="/guide">a guide</a>.</p>
      <h2>Second heading</h2>
      <blockquote><p>A quoted conclusion.</p></blockquote>
      <pre><code>const answer = 42;
console.log(answer);</code></pre>
    </main>
  </body>
</html>
