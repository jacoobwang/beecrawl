name: Build and publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/publish-images.yml"
      - ".dockerignore"
      - "Dockerfile.*"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - "apps/api/**"
      - "apps/bee-engine/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    name: Build ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: beecrawl-api
            dockerfile: Dockerfile.rust
            buildArgs: BIN=beecrawl-api
          - component: worker
            image: beecrawl-worker
            dockerfile: Dockerfile.rust
            buildArgs: BIN=worker
          - component: bee-engine
            image: beecrawl-bee-engine
            dockerfile: Dockerfile.bee-engine
            buildArgs: ""
          - component: migrations
            image: beecrawl-migrations
            dockerfile: Dockerfile.rust
            buildArgs: BIN=migrate
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=tag

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.buildArgs }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
