name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beecrawl_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d beecrawl_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BEECRAWL_DATABASE_URL: postgres://postgres:postgres@localhost:5432/beecrawl_test
      BEECRAWL_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/beecrawl_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup component add clippy rustfmt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --extra dev --extra browser --locked
      - run: cargo install sqlx-cli --version 0.8.6 --no-default-features --features postgres,rustls
      - run: make migrate-up
      - run: make test
      - run: make lint

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.0
      - run: helm lint infra/charts/beecrawl
      - run: helm lint infra/charts/beecrawl -f infra/charts/beecrawl/values-production.example.yaml
      - run: >-
          helm template beecrawl infra/charts/beecrawl
          -f infra/charts/beecrawl/values-production.example.yaml
          --set api.image.repository=example/beecrawl-api
          --set worker.image.repository=example/beecrawl-worker
          --set beeEngine.image.repository=example/beecrawl-bee-engine
          --set global.imageTag=sha-ci
          > /dev/null
